<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Haji</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Poppins,sans-serif;
}

/* OPENING */
#opening{
  position:fixed;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  z-index:9999;
  transition:1s;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
  pointer-events:none; /* 🔥 FIX */
}

.top-text{
  position:relative;
  z-index:2;
  text-align:center;
  margin-top:80px;
}

.small{
  color:#ddd;
  font-size:18px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.top-text h1{
  color:#fff;
  font-family:'Playfair Display';
  font-size:32px;
}

/* BOX TAMU */
.guest-box{
  position:relative;
  z-index:5;
  margin:20px;
  margin-bottom:40px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,.4);
  text-align:center;
}

.kepada{color:#ccc;}

.nama-tamu{
  color:gold;
  text-shadow:0 0 10px rgba(255,215,0,.6);
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:14px 35px;
  border:none;
  border-radius:40px;
  background:linear-gradient(45deg,gold,#ffd700);
  font-weight:bold;
  box-shadow:0 5px 20px rgba(255,215,0,.4);
}

/* SWIPER */
.swiper, .swiper-wrapper, .swiper-slide{
  width:100vw;
  height:100dvh;
}

.swiper-slide{
  position:relative;
  display:flex;
}

/* BACKGROUND */
.bg{
  position:absolute;
  top:-10%;
  left:-10%;
  width:120vw;
  height:120dvh;
  background:url('bg.jpg') center/cover no-repeat;
  filter:brightness(.65) contrast(1.15);
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* OVERLAY */
.swiper-slide::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.75) 20%,
    rgba(0,0,0,.4) 60%,
    transparent
  );
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  padding-bottom:80px;
}

.content span{
  color:#fff;
  font-size:16px;
  text-shadow:0 2px 6px rgba(0,0,0,.8);
  margin:6px 0;
}

/* ========================= */
/* JADWAL */
/* ========================= */

.jadwal-box{
  width:100%;
  max-width:360px;
  display:flex;
  border-radius:25px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.3);
}

.tanggal-box{
  width:110px;
  background:rgba(255,255,255,0.2);
  text-align:center;
  padding:15px;
}

.tgl{font-size:42px;font-weight:bold;color:#000;}
.bulan,.tahun{font-size:16px;color:#000;}

.detail-box{flex:1;padding:20px;color:#fff;}

.btn-map{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:25px;
  background:#fff;
  font-weight:bold;
}

/* COUNTDOWN LUAR */
.countdown-luar{
  margin-top:25px;
  text-align:center;
  color:#fff;
}

#countdown{
  display:flex;
  justify-content:center;
  gap:12px;
}

#countdown span{
  background:rgba(255,255,255,0.12);
  padding:12px;
  border-radius:12px;
  min-width:60px;
  color:gold;
}

</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <div class="overlay"></div>

  <div class="top-text">
    <p class="small">Walimatus Safar Haji</p>
    <h1>Bapak & Ibu Erwan</h1>
  </div>

  <div class="guest-box">
    <p class="kepada">Kepada Yth. Bapak/Ibu/Sdr/i :</p>
    <p id="nama" class="nama-tamu"></p>
    <button class="btn" onclick="buka()">Buka Undangan</button>
  </div>
</div>

<audio id="musik" loop muted>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="swiper">
<div class="swiper-wrapper">

<!-- HOME -->
<div class="swiper-slide">
<div class="bg"></div>
<div class="content">
<span>اَلسَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ</span>
<span>Tasyakuran Walimatus Safar Haji</span>
</div>
</div>

<!-- JADWAL -->
<div class="swiper-slide">
<div class="bg"></div>

<div class="content">

  <div class="jadwal-box">
    <div class="tanggal-box">
      <div class="tgl">31</div>
      <div class="bulan">MAR</div>
      <div class="tahun">2026</div>
    </div>

    <div class="detail-box">
      <h2>Resepsi</h2>
      <p>⏰ 12:00 - 14:00 WITA</p>
      <p>📍 Jl. Komputer No. 8 Karang Bedil, Mataram</p>

      <button class="btn-map" onclick="map()">PETUNJUK ARAH →</button>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown-luar">
    <p>Menuju Acara</p>
    <div id="countdown"></div>
  </div>

</div>
</div>

<!-- RSVP -->
<div class="swiper-slide">
<div class="bg"></div>
<div class="content">
<span>Konfirmasi Kehadiran</span>
<button class="btn" onclick="wa()">WhatsApp</button>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

const p=new URLSearchParams(window.location.search)
const namaParam=p.get('to')
document.getElementById('nama').innerText =
  namaParam ? decodeURIComponent(namaParam) : 'Tamu Undangan'

function buka(){
  const musik=document.getElementById('musik')
  const opening=document.getElementById('opening')
  opening.style.opacity='0'
  setTimeout(()=>opening.style.display='none',800)
  musik.muted=false
  musik.play().catch(()=>{})
}

new Swiper('.swiper',{direction:'vertical',mousewheel:true})

function map(){
  window.open("https://maps.google.com/?q=mataram")
}

function wa(){
  const nama=namaParam||'Tamu'
  window.open(`https://wa.me/6281234567890?text=Saya ${nama} akan hadir`)
}

/* COUNTDOWN */
const target=new Date("Mar 31, 2026 12:00:00").getTime()

setInterval(()=>{
  const el=document.getElementById("countdown")
  if(!el) return

  const now=new Date().getTime()
  const d=target-now

  const h=Math.floor(d/(1000*60*60*24))
  const j=Math.floor((d%(1000*60*60*24))/(1000*60*60))
  const m=Math.floor((d%(1000*60*60))/(1000*60))
  const s=Math.floor((d%(1000*60))/1000)

  el.innerHTML=`
    <span>${h}<br>Hari</span>
    <span>${j}<br>Jam</span>
    <span>${m}<br>Menit</span>
    <span>${s}<br>Detik</span>
  `
},1000)

</script>

</body>
</html>
