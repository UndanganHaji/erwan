<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Haji</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Poppins,sans-serif;
}

/* OPENING */
#opening{
  position:fixed;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  z-index:9999;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

.top-text{
  position:relative;
  z-index:2;
  text-align:center;
  margin-top:80px;
}

.small{
  color:#ddd;
  font-size:18px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.top-text h1{
  color:#fff;
  font-family:'Playfair Display';
  font-size:32px;
}

/* BOX TAMU */
.guest-box{
  position:relative;
  z-index:2;
  margin:20px;
  margin-bottom:40px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,.4);
  text-align:center;
}

.kepada{color:#ccc;}

.nama-tamu{
  color:gold;
  text-shadow:0 0 10px rgba(255,215,0,.6);
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:14px 35px;
  border:none;
  border-radius:40px;
  background:linear-gradient(45deg,gold,#ffd700);
  font-weight:bold;
  box-shadow:0 5px 20px rgba(255,215,0,.4);
}

/* SWIPER */
.swiper, .swiper-wrapper, .swiper-slide{
  width:100vw;
  height:100dvh;
}

.swiper-slide{
  position:relative;
  display:flex;
}

/* BACKGROUND */
.bg{
  position:absolute;
  top:-10%;
  left:-10%;
  width:120vw;
  height:120dvh;
  background:url('bg.jpg') center/cover no-repeat;
  filter:brightness(.65) contrast(1.15);
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* OVERLAY */
.swiper-slide::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.75) 20%,
    rgba(0,0,0,.4) 60%,
    transparent
  );
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  padding-bottom:80px;
}

.content span{
  color:#fff;
  font-size:16px;
  text-shadow:0 2px 6px rgba(0,0,0,.8);
  margin:6px 0;
}

/* COUPLE */
.couple-vertical{
  margin-top:25px;
  width:100%;
  max-width:360px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.row{
  display:flex;
  align-items:center;
  gap:12px;
  opacity:0;
}

.row.left{justify-content:flex-start; animation:slideLeft .8s forwards;}
.row.right{justify-content:flex-end; animation:slideRight .8s forwards; animation-delay:.3s;}

.row.right .nama{order:1;text-align:right;}
.row.right img{order:2;}

.foto-besar{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid gold;
  animation:glow 3s infinite;
}

@keyframes glow{
  0%{box-shadow:0 0 5px rgba(255,215,0,.4);}
  50%{box-shadow:0 0 20px rgba(255,215,0,.9);}
  100%{box-shadow:0 0 5px rgba(255,215,0,.4);}
}

.nama{
  color:#fff;
  font-size:18px;
  font-weight:600;
  text-shadow:0 0 10px rgba(255,215,0,.6);
}

.and{
  color:gold;
  font-size:26px;
  font-weight:bold;
  text-align:center;
  position:relative;
}

.and::before,.and::after{
  content:'';
  position:absolute;
  top:50%;
  width:40px;
  height:1px;
  background:gold;
  opacity:.6;
}

.and::before{left:-50px;}
.and::after{right:-50px;}

@keyframes slideLeft{
  from{opacity:0; transform:translateX(-50px);}
  to{opacity:1; transform:translateX(0);}
}
@keyframes slideRight{
  from{opacity:0; transform:translateX(50px);}
  to{opacity:1; transform:translateX(0);}
}

.penutup{
  margin-top:15px;
  color:#fff;
  font-size:16px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100vw;
  height:70px;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}

.nav a{color:#aaa;text-decoration:none;font-size:12px;}
.nav a.active{color:gold;}

/* JADWAL */
.jadwal-box{
  width:100%;
  max-width:360px;
  display:flex;
  border-radius:25px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.1);
}

.tanggal-box{
  width:110px;
  background:rgba(255,255,255,0.2);
  text-align:center;
  padding:15px;
}

.detail-box{
  flex:1;
  padding:20px;
  color:#fff;
}

.btn-map{
  margin-top:15px;
  padding:12px;
  width:100%;
  border-radius:25px;
  border:none;
}

/* ✅ COUNTDOWN */
.countdown-box{
  margin-top:25px;
  text-align:center;
  color:#fff;
}

#countdown{
  font-size:20px;
  color:gold;
}

</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <div class="overlay"></div>
  <div class="top-text">
    <p class="small">Walimatus Safar Haji</p>
    <h1>Bapak & Ibu Erwan</h1>
  </div>
  <div class="guest-box">
    <p class="kepada">Kepada Yth:</p>
    <p id="nama" class="nama-tamu"></p>
    <button class="btn" onclick="buka()">Buka Undangan</button>
  </div>
</div>

<audio id="musik" loop muted>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="swiper">
<div class="swiper-wrapper">

<!-- HOME -->
<div class="swiper-slide">
<div class="bg"></div>
<div class="content">
<span>Assalamu'alaikum</span>
</div>
</div>

<!-- JADWAL -->
<div class="swiper-slide">
<div class="bg"></div>
<div class="content">

<div class="jadwal-box">
  <div class="tanggal-box">
    <div class="tgl">07</div>
    <div>APR</div>
    <div>2026</div>
  </div>

  <div class="detail-box">
    <h2>Resepsi</h2>
    <p>11:00 - 14:00 WITA</p>
    <button class="btn-map">Map</button>
  </div>
</div>

<!-- ✅ PINDAH KE LUAR -->
<div class="countdown-box">
  <p>Menuju Acara</p>
  <div id="countdown"></div>
</div>

</div>
</div>

</div>
</div>

<script>
const targetDate = new Date("Mar 31, 2026 12:00:00").getTime();

setInterval(function(){
  const now = new Date().getTime();
  const distance = targetDate - now;

  const hari = Math.floor(distance / (1000 * 60 * 60 * 24));
  const jam = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const menit = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const detik = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    `${hari}H ${jam}J ${menit}M ${detik}D`;
},1000);
</script>

</body>
</html>
