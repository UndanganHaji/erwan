<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Haji</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Poppins,sans-serif;
}

/* OPENING */
#opening{
  position:fixed;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  z-index:9999;
  transition:1s;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
  pointer-events:none; /* 🔥 FIX */
}

.top-text{
  position:relative;
  z-index:2;
  text-align:center;
  margin-top:80px;
}

.small{
  color:#ddd;
  font-size:18px;
  letter-spacing:2px;
}

.top-text h1{
  color:#fff;
  font-family:'Playfair Display';
  font-size:32px;
}

/* BOX TAMU */
.guest-box{
  position:relative;
  z-index:5;
  margin:20px;
  margin-bottom:40px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,.4);
  text-align:center;
}

.nama-tamu{
  color:gold;
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:14px 35px;
  border:none;
  border-radius:40px;
  background:linear-gradient(45deg,gold,#ffd700);
  font-weight:bold;
}

/* SWIPER */
.swiper, .swiper-wrapper, .swiper-slide{
  width:100vw;
  height:100dvh;
}

.swiper-slide{
  position:relative;
}

/* BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  filter:brightness(.65);
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.content span{
  color:#fff;
}

/* ================= */
/* JADWAL */
/* ================= */

.jadwal-box{
  width:100%;
  max-width:360px;
  display:flex;
  border-radius:25px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.1);
}

/* kiri */
.tanggal-box{
  width:110px;
  background:rgba(255,255,255,0.2);
  text-align:center;
  padding:15px;
}

.tgl{font-size:42px;font-weight:bold;color:#000;}
.bulan,.tahun{color:#000;}

/* kanan */
.detail-box{
  flex:1;
  padding:20px;
  color:#fff;
}

.btn-map{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:20px;
}

/* COUNTDOWN */
.countdown-luar{
  margin-top:25px;
  text-align:center;
  color:#fff;
}

#countdown{
  display:flex;
  gap:10px;
}

#countdown span{
  background:rgba(255,255,255,0.15);
  padding:10px;
  border-radius:10px;
  min-width:60px;
  color:gold;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,.8);
}

.nav a{
  color:#aaa;
  padding:10px;
}

.nav a.active{color:gold;}

</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <div class="overlay"></div>

  <div class="top-text">
    <p class="small">Walimatus Safar Haji</p>
    <h1>Bapak & Ibu Erwan</h1>
  </div>

  <div class="guest-box">
    <p>Kepada Yth :</p>
    <p id="nama" class="nama-tamu"></p>
    <button class="btn" onclick="buka()">Buka Undangan</button>
  </div>
</div>

<audio id="musik" loop muted>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="swiper">
<div class="swiper-wrapper">

<!-- HOME -->
<div class="swiper-slide">
<div class="bg"></div>
<div class="content">
<span>Assalamu'alaikum</span>
<span>Tasyakuran Haji</span>
</div>
</div>

<!-- JADWAL -->
<div class="swiper-slide">
<div class="bg"></div>

<div class="content">

<div class="jadwal-box">

  <div class="tanggal-box">
    <div class="tgl">31</div>
    <div class="bulan">MAR</div>
    <div class="tahun">2026</div>
  </div>

  <div class="detail-box">
    <h2>Resepsi</h2>
    <p>12:00 - 14:00 WITA</p>
    <p>Mataram</p>
    <button class="btn-map" onclick="map()">Petunjuk Arah</button>
  </div>

</div>

<div class="countdown-luar">
  <p>Menuju Acara</p>
  <div id="countdown"></div>
</div>

</div>
</div>

<!-- RSVP -->
<div class="swiper-slide">
<div class="bg"></div>
<div class="content">
<span>Konfirmasi Kehadiran</span>
<button class="btn" onclick="wa()">WhatsApp</button>
</div>
</div>

</div>
</div>

<div class="nav">
<a onclick="go(0)" class="active">Home</a>
<a onclick="go(1)">Jadwal</a>
<a onclick="go(2)">RSVP</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

// nama tamu
const p=new URLSearchParams(window.location.search)
const namaParam=p.get('to')
document.getElementById('nama').innerText =
  namaParam ? decodeURIComponent(namaParam) : 'Tamu Undangan'

// buka
function buka(){
  const musik=document.getElementById('musik')
  const opening=document.getElementById('opening')

  opening.style.opacity='0'
  setTimeout(()=>opening.style.display='none',800)

  musik.muted=false
  musik.play().catch(()=>{})
}

// swiper
const swiper=new Swiper('.swiper',{
  direction:'vertical',
  speed:900,
  mousewheel:true,
  on:{
    slideChange:function(){
      document.querySelectorAll('.nav a').forEach((el,i)=>{
        el.classList.toggle('active',i===this.activeIndex)
      })
    }
  }
})

function go(i){swiper.slideTo(i)}

// maps
function map(){
  window.open("https://maps.google.com/?q=mataram")
}

// WA
function wa(){
  const nama=namaParam||'Tamu'
  const pesan=`Assalamu'alaikum, saya ${nama} akan hadir.`
  window.open(`https://wa.me/6281234567890?text=${encodeURIComponent(pesan)}`)
}

// countdown
const countdownEl = document.getElementById("countdown");

const targetDate = new Date("Mar 31, 2026 12:00:00").getTime();

setInterval(function(){

  if(!countdownEl) return;

  const now = new Date().getTime();
  const d = targetDate - now;

  const h = Math.floor(d/(1000*60*60*24));
  const j = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((d%(1000*60*60))/(1000*60));
  const s = Math.floor((d%(1000*60))/1000);

  countdownEl.innerHTML = `
    <span>${h}<br>Hari</span>
    <span>${j}<br>Jam</span>
    <span>${m}<br>Menit</span>
    <span>${s}<br>Detik</span>
  `;

},1000);

</script>

</body>
</html>
