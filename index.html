<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Syukuran Haji</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  font-family:Poppins,sans-serif;
}

/* BACKGROUND */
.hero{
  position:relative;
  width:100%;
  height:100vh;
  background:url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* OVERLAY GELAP */
.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.4), rgba(0,0,0,.8));
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  color:#fff;
  text-align:center;
}

/* TEXT */
.small{
  font-size:14px;
  letter-spacing:2px;
}

.nama{
  font-family:'Great Vibes', cursive;
  font-size:36px;
  margin:10px 0;
}

.garis{
  margin:15px 0;
  border-top:1px solid rgba(255,255,255,.4);
}

.tamu{
  font-size:14px;
  opacity:.8;
}

.nama-tamu{
  font-size:18px;
  font-weight:500;
}

/* TOMBOL */
.btn-buka{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:18px;
  border:none;
  background:#eee;
  font-size:16px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="hero">

  <div class="card">
    <div class="small">UNDANGAN SYUKURAN HAJI</div>

    <div class="nama">Bapak Ahmad<br>& Ibu Ahmad</div>

    <div class="garis"></div>

    <div class="tamu">Kepada Yth.</div>
    <div class="nama-tamu" id="nama">Tamu Undangan</div>
  </div>

  <button class="btn-buka" onclick="buka()">📩 Buka Undangan</button>

</div>

<script>

/* AMBIL NAMA TAMU DARI LINK */
const p = new URLSearchParams(window.location.search)
document.getElementById('nama').innerText = p.get('to') || 'Tamu Undangan'

function buka(){
  alert("Masuk ke halaman undangan berikutnya 🔥")
  // nanti bisa diarahkan ke halaman swiper kamu
  // contoh:
  // window.location.href = "home.html"
}

</script>

</body>
</html>
